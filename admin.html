<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咔乐艺术 - 管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm: #d4846a;
            --warm-deep: #c06a4e;
            --warm-light: #fdf0eb;
            --cream: #fef9f3;
            --ink: #3d322b;
            --ink-light: #7a6e64;
            --green: #5b8c5a;
            --green-light: #e8f0e5;
            --gold: #d4a853;
            --gold-light: #faf5e8;
            --white: #ffffff;
            --border: #ede4db;
            --shadow-sm: 0 2px 12px rgba(61,50,43,0.06);
            --shadow: 0 4px 24px rgba(61,50,43,0.09);
            --shadow-lg: 0 8px 40px rgba(61,50,43,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font-display: "Noto Serif SC", serif;
            --font-body: "Noto Sans SC", sans-serif;
            --max-width: 1200px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--cream);
            color: var(--ink);
            line-height: 1.8;
        }

        /* 登录界面 */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf0eb 100%);
        }

        .login-box {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-family: var(--font-display);
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
            color: var(--warm);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--ink);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--warm);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--warm);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: var(--warm-deep);
        }

        /* 管理界面 */
        .admin-container {
            display: none;
            min-height: 100vh;
        }

        .admin-header {
            background: var(--warm);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .admin-nav {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-nav h1 {
            font-family: var(--font-display);
            font-size: 24px;
        }

        .logout-btn {
            padding: 8px 20px;
            background: white;
            color: var(--warm);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .admin-content {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 40px 20px;
        }

        .admin-section {
            background: white;
            padding: 30px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .admin-section h2 {
            font-family: var(--font-display);
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--ink);
        }

        .editable {
            border: 2px dashed transparent;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .editable:hover {
            border-color: var(--warm);
            background: var(--warm-light);
        }

        .editing {
            border-color: var(--warm);
            background: var(--warm-light);
        }

        .edit-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--warm);
            border-radius: 4px;
            font-size: 16px;
            font-family: inherit;
        }

        .edit-textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--warm);
            border-radius: 4px;
            font-size: 16px;
            font-family: inherit;
            min-height: 100px;
            resize: vertical;
        }

        .save-btn {
            margin-top: 10px;
            padding: 6px 16px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .save-btn:hover {
            background: #4a7c4a;
        }

        .cancel-btn {
            margin-top: 10px;
            margin-right: 10px;
            padding: 6px 16px;
            background: #999;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .cancel-btn:hover {
            background: #777;
        }

        /* 教师管理 */
        .teacher-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .teacher-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .teacher-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .action-btn {
            padding: 4px 8px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .edit-teacher {
            background: var(--warm);
            color: white;
        }

        .delete-teacher {
            background: #e74c3c;
            color: white;
        }

        /* 添加按钮 */
        .add-btn {
            padding: 12px 24px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .add-btn:hover {
            background: #4a7c4a;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: var(--green);
            color: white;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s;
        }

        .notification.show {
            transform: translateX(0);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: var(--radius);
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--ink);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--ink-light);
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .course-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .course-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .course-actions button {
            padding: 4px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .edit-stage {
            background: var(--warm);
            color: white;
        }

        .delete-stage {
            background: #e74c3c;
            color: white;
        }

        .add-stage-btn {
            background: var(--green);
            color: white;
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>🎨 咔乐艺术 - 管理后台</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="adminPassword">管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理密码" required>
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: var(--ink-light); font-size: 14px;">
                提示：默认密码是 123456
            </p>
        </div>
    </div>

    <!-- 管理界面 -->
    <div class="admin-container" id="adminContainer">
        <header class="admin-header">
            <div class="admin-nav">
                <h1>🎨 管理后台</h1>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </header>

        <div class="admin-content">
            <!-- 网站基本信息 -->
            <div class="admin-section">
                <h2>📝 网站基本信息</h2>
                <div class="editable" onclick="editText(this, 'siteTitle')">
                    <h3 id="siteTitle">合肥咔乐艺术培训中心</h3>
                </div>

                <div class="editable" onclick="editText(this, 'siteSubtitle')" style="margin-top: 15px;">
                    <p id="siteSubtitle">用爱与专业守护每一个艺术梦想</p>
                </div>

                <div class="editable" onclick="editText(this, 'siteDescription')" style="margin-top: 15px;">
                    <p id="siteDescription">合肥咔乐艺术培训中心，专注少儿美术教育。开设水彩、素描、国画、书法、油画等课程，专业师资，小班教学。</p>
                </div>
            </div>

            <!-- 课程管理 -->
            <div class="admin-section">
                <h2>📚 课程管理</h2>
                <button class="add-btn" onclick="showAddCourseModal()">+ 添加新课程</button>
                <div id="coursesList"></div>
            </div>

            <!-- 教师管理 -->
            <div class="admin-section">
                <h2>👥 教师管理</h2>
                <button class="add-btn" onclick="showAddTeacherModal()">+ 添加新教师</button>
                <div id="teachersList" class="teacher-grid"></div>
            </div>

            <!-- 新闻动态 -->
            <div class="admin-section">
                <h2>📰 新闻动态</h2>
                <button class="add-btn" onclick="showAddNewsModal()">+ 添加新闻</button>
                <div id="newsList"></div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑课程模态框 -->
    <div class="modal" id="courseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="courseModalTitle">添加新课程</h3>
                <button class="close-modal" onclick="closeCourseModal()">&times;</button>
            </div>
            <form id="courseForm">
                <div class="form-group">
                    <label>课程名称</label>
                    <input type="text" id="courseName" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>授课老师</label>
                        <input type="text" id="courseTeacher" required>
                    </div>
                    <div class="form-group">
                        <label>年龄段</label>
                        <input type="text" id="courseAge" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>课程简介</label>
                    <input type="text" id="courseDesc" required>
                </div>
                <div class="form-group">
                    <label>课程详情</label>
                    <textarea id="courseDetail" rows="4"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>价格</label>
                        <input type="text" id="coursePrice">
                    </div>
                    <div class="form-group">
                        <label>课时</label>
                        <input type="text" id="courseDuration">
                    </div>
                    <div class="form-group">
                        <label>班级人数</label>
                        <input type="text" id="courseClassSize">
                    </div>
                </div>
                <div class="form-group">
                    <label>课程阶段</label>
                    <div id="courseStages"></div>
                    <button type="button" class="add-btn add-stage-btn" onclick="addCourseStage()">+ 添加阶段</button>
                </div>
                <button type="submit" class="save-btn">保存课程</button>
            </form>
        </div>
    </div>

    <!-- 添加/编辑教师模态框 -->
    <div class="modal" id="teacherModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="teacherModalTitle">添加新教师</h3>
                <button class="close-modal" onclick="closeTeacherModal()">&times;</button>
            </div>
            <form id="teacherForm">
                <div class="form-group">
                    <label>教师姓名</label>
                    <input type="text" id="teacherName" required>
                </div>
                <div class="form-group">
                    <label>一句话标签</label>
                    <input type="text" id="teacherTagline" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>毕业院校</label>
                        <input type="text" id="teacherSchool" required>
                    </div>
                    <div class="form-group">
                        <label>学历</label>
                        <input type="text" id="teacherDegree" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>教师资格证</label>
                        <input type="text" id="teacherCert" required>
                    </div>
                    <div class="form-group">
                        <label>从教年限</label>
                        <input type="text" id="teacherYears" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>教学理念</label>
                    <textarea id="teacherPhilosophy" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>擅长领域</label>
                    <input type="text" id="teacherSpecialties" placeholder="用逗号分隔">
                </div>
                <div class="form-group">
                    <label>教学成果</label>
                    <textarea id="teacherAchievements" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>写给家长的话</label>
                    <textarea id="teacherMessage" rows="4"></textarea>
                </div>
                <button type="submit" class="save-btn">保存教师</button>
            </form>
        </div>
    </div>

    <!-- 添加/编辑新闻模态框 -->
    <div class="modal" id="newsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="newsModalTitle">添加新闻</h3>
                <button class="close-modal" onclick="closeNewsModal()">&times;</button>
            </div>
            <form id="newsForm">
                <div class="form-group">
                    <label>新闻标题</label>
                    <input type="text" id="newsTitle" required>
                </div>
                <div class="form-group">
                    <label>发布日期</label>
                    <input type="date" id="newsDate" required>
                </div>
                <div class="form-group">
                    <label>新闻内容</label>
                    <textarea id="newsContent" rows="6" required></textarea>
                </div>
                <button type="submit" class="save-btn">保存新闻</button>
            </form>
        </div>
    </div>

    <!-- 通知 -->
    <div class="notification" id="notification"></div>

                    title: '2026年春季班招生开始啦！',
                    date: '2026-03-01',
                    content: '新学期新气象，咔乐艺术2026年春季班开始招生了！开设水彩、素描、国画、书法等多个课程，欢迎小朋友们报名学习。'
                }
            ]
        };

        // 当前编辑的数据
        let editingCourse = null;
        let editingTeacher = null;
        let editingNews = null;
        let courseStagesList = [];

        // 登录
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
                renderAll();
            } else {
                alert('密码错误！');
            }
        });

        // 退出登录
        function logout() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminContainer').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }

        // 编辑文本
        function editText(element, field) {
            const originalContent = element.innerHTML;
            const isHtml = field === 'siteTitle';

            if (isHtml) {
                element.innerHTML = `<input type="text" class="edit-input" value="${websiteData.site[field]}" id="edit-${field}">`;
            } else {
                element.innerHTML = `<textarea class="edit-textarea" id="edit-${field}">${websiteData.site[field]}</textarea>`;
            }

            element.classList.add('editing');

            const input = document.getElementById(`edit-${field}`);
            input.focus();

            element.onclick = null; // 防止再次触发

            const saveBtn = document.createElement('div');
            saveBtn.innerHTML = `<button class="cancel-btn" onclick="cancelEdit(this, '${field}', \`${originalContent.replace(/`/g, '\\`')}\`)">取消</button><button class="save-btn" onclick="saveText('${field}', this.parentElement.parentElement)">保存</button>`;
            element.appendChild(saveBtn);
        }

        // 取消编辑
        function cancelEdit(btn, field, originalContent) {
            const element = btn.parentElement.parentElement;
            element.innerHTML = originalContent;
            element.classList.remove('editing');
            element.onclick = () => editText(element, field);
        }

        // 保存文本
        function saveText(field, element) {
            const input = element.querySelector(`#edit-${field}`);
            websiteData.site[field] = input.value;
            saveData();

            // 更新页面
            if (field === 'siteTitle') {
                document.getElementById('siteTitle').textContent = input.value;
            } else if (field === 'siteSubtitle') {
                document.getElementById('siteSubtitle').textContent = input.value;
            } else if (field === 'siteDescription') {
                document.getElementById('siteDescription').textContent = input.value;
            }

            element.classList.remove('editing');
            element.onclick = () => editText(element, field);
        }

        // 保存数据并更新主网站
        function saveData() {
            // 更新localStorage
            localStorage.setItem('kaleart_admin_data', JSON.stringify(websiteData));

            // 更新主网站
            updateMainSite();

            // 显示通知
            showNotification('保存成功！');
        }

        // 更新主网站
        function updateMainSite() {
            // 这里更新主网站的数据结构
            const mainSiteData = {
                site: websiteData.site,
                courses: websiteData.courses,
                teachers: websiteData.teachers,
                news: websiteData.news
            };

            // 保存到localStorage供主网站使用
            localStorage.setItem('kaleart_main_data', JSON.stringify(mainSiteData));

            // 更新网站URL参数以触发重新加载
            const url = new URL(window.location);
            url.searchParams.set('t', Date.now());
            window.history.replaceState({}, '', url);
        }

        // 显示通知
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 渲染所有内容
        function renderAll() {
            renderCourses();
            renderTeachers();
            renderNews();
        }

        // 渲染课程
        function renderCourses() {
            const container = document.getElementById('coursesList');
            container.innerHTML = websiteData.courses.map(course => `
                <div class="teacher-card">
                    <div class="teacher-actions">
                        <button class="action-btn edit-teacher" onclick="editCourse(${course.id})">编辑</button>
                        <button class="action-btn delete-teacher" onclick="deleteCourse(${course.id})">删除</button>
                    </div>
                    <h3>${course.name}</h3>
                    <p style="color: var(--warm); margin: 10px 0;">授课老师：${course.teacher}</p>
                    <p style="color: var(--ink-light); margin: 10px 0;">年龄：${course.age}</p>
                    <p>${course.desc}</p>
                </div>
            `).join('');
        }

        // 渲染教师
        function renderTeachers() {
            const container = document.getElementById('teachersList');
            container.innerHTML = websiteData.teachers.map(teacher => `
                <div class="teacher-card">
                    <div class="teacher-actions">
                        <button class="action-btn edit-teacher" onclick="editTeacher(${teacher.id})">编辑</button>
                        <button class="action-btn delete-teacher" onclick="deleteTeacher(${teacher.id})">删除</button>
                    </div>
                    <h3>${teacher.name}</h3>
                    <p style="color: var(--warm); font-size: 14px; margin: 5px 0;">${teacher.tagline}</p>
                    <p style="color: var(--ink-light); font-size: 12px; margin: 5px 0;">${teacher.school} | ${teacher.years}年</p>
                    <p style="margin-top: 10px; font-size: 14px;">${teacher.philosophy}</p>
                </div>
            `).join('');
        }

        // 渲染新闻
        function renderNews() {
            const container = document.getElementById('newsList');
            container.innerHTML = websiteData.news.map(news => `
                <div class="teacher-card" style="margin-bottom: 15px;">
                    <div class="teacher-actions">
                        <button class="action-btn edit-teacher" onclick="editNews(${news.id})">编辑</button>
                        <button class="action-btn delete-teacher" onclick="deleteNews(${news.id})">删除</button>
                    </div>
                    <h3>${news.title}</h3>
                    <p style="color: var(--ink-light); font-size: 14px; margin: 5px 0;">${news.date}</p>
                    <p style="margin-top: 10px; font-size: 14px;">${news.content}</p>
                </div>
            `).join('');
        }

        // 课程模态框
        function showAddCourseModal() {
            editingCourse = null;
            courseStagesList = [];
            document.getElementById('courseModalTitle').textContent = '添加新课程';
            document.getElementById('courseForm').reset();
            renderCourseStages();
            document.getElementById('courseModal').style.display = 'flex';
        }

        function editCourse(id) {
            const course = websiteData.courses.find(c => c.id === id);
            if (!course) return;

            editingCourse = course;
            courseStagesList = [...course.stages];

            document.getElementById('courseModalTitle').textContent = '编辑课程';
            document.getElementById('courseName').value = course.name;
            document.getElementById('courseTeacher').value = course.teacher;
            document.getElementById('courseAge').value = course.age;
            document.getElementById('courseDesc').value = course.desc;
            document.getElementById('courseDetail').value = course.detail || '';
            document.getElementById('coursePrice').value = course.price || '';
            document.getElementById('courseDuration').value = course.duration || '';
            document.getElementById('courseClassSize').value = course.classSize || '';

            renderCourseStages();
            document.getElementById('courseModal').style.display = 'flex';
        }

        function closeCourseModal() {
            document.getElementById('courseModal').style.display = 'none';
        }

        // 添加课程阶段
        function addCourseStage() {
            const stage = prompt('阶段名称：');
            if (stage) {
                courseStagesList.push(stage);
                renderCourseStages();
            }
        }

        function editCourseStage(index) {
            const stage = prompt('阶段名称：', courseStagesList[index]);
            if (stage !== null) {
                courseStagesList[index] = stage;
                renderCourseStages();
            }
        }

        function deleteCourseStage(index) {
            courseStagesList.splice(index, 1);
            renderCourseStages();
        }

        function renderCourseStages() {
            const container = document.getElementById('courseStages');
            container.innerHTML = courseStagesList.map((stage, index) => `
                <div class="course-item">
                    <input type="text" value="${stage}" onchange="updateCourseStage(${index}, this.value)">
                    <div class="course-actions">
                        <button type="button" class="action-btn edit-stage" onclick="editCourseStage(${index})">编辑</button>
                        <button type="button" class="action-btn delete-stage" onclick="deleteCourseStage(${index})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function updateCourseStage(index, value) {
            courseStagesList[index] = value;
        }

        // 保存课程
        document.getElementById('courseForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const courseData = {
                id: editingCourse ? editingCourse.id : Date.now(),
                name: document.getElementById('courseName').value,
                teacher: document.getElementById('courseTeacher').value,
                age: document.getElementById('courseAge').value,
                desc: document.getElementById('courseDesc').value,
                detail: document.getElementById('courseDetail').value,
                price: document.getElementById('coursePrice').value,
                duration: document.getElementById('courseDuration').value,
                classSize: document.getElementById('courseClassSize').value,
                stages: courseStagesList
            };

            if (editingCourse) {
                Object.assign(editingCourse, courseData);
            } else {
                websiteData.courses.push(courseData);
            }

            saveData();
            renderCourses();
            closeCourseModal();
        });

        // 删除课程
        function deleteCourse(id) {
            if (confirm('确定要删除这个课程吗？')) {
                websiteData.courses = websiteData.courses.filter(c => c.id !== id);
                saveData();
                renderCourses();
            }
        }

        // 教师模态框
        function showAddTeacherModal() {
            editingTeacher = null;
            document.getElementById('teacherModalTitle').textContent = '添加新教师';
            document.getElementById('teacherForm').reset();
            document.getElementById('teacherModal').style.display = 'flex';
        }

        function editTeacher(id) {
            const teacher = websiteData.teachers.find(t => t.id === id);
            if (!teacher) return;

            editingTeacher = teacher;

            document.getElementById('teacherModalTitle').textContent = '编辑教师';
            document.getElementById('teacherName').value = teacher.name;
            document.getElementById('teacherTagline').value = teacher.tagline;
            document.getElementById('teacherSchool').value = teacher.school;
            document.getElementById('teacherDegree').value = teacher.degree;
            document.getElementById('teacherCert').value = teacher.cert;
            document.getElementById('teacherYears').value = teacher.years;
            document.getElementById('teacherPhilosophy').value = teacher.philosophy;
            document.getElementById('teacherSpecialties').value = teacher.specialties;
            document.getElementById('teacherAchievements').value = teacher.achievements;
            document.getElementById('teacherMessage').value = teacher.message;

            document.getElementById('teacherModal').style.display = 'flex';
        }

        function closeTeacherModal() {
            document.getElementById('teacherModal').style.display = 'none';
        }

        // 保存教师
        document.getElementById('teacherForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const teacherData = {
                id: editingTeacher ? editingTeacher.id : Date.now(),
                name: document.getElementById('teacherName').value,
                tagline: document.getElementById('teacherTagline').value,
                school: document.getElementById('teacherSchool').value,
                degree: document.getElementById('teacherDegree').value,
                cert: document.getElementById('teacherCert').value,
                years: document.getElementById('teacherYears').value,
                philosophy: document.getElementById('teacherPhilosophy').value,
                specialties: document.getElementById('teacherSpecialties').value,
                achievements: document.getElementById('teacherAchievements').value,
                message: document.getElementById('teacherMessage').value
            };

            if (editingTeacher) {
                Object.assign(editingTeacher, teacherData);
            } else {
                websiteData.teachers.push(teacherData);
            }

            saveData();
            renderTeachers();
            closeTeacherModal();
        });

        // 删除教师
        function deleteTeacher(id) {
            if (confirm('确定要删除这位教师吗？')) {
                websiteData.teachers = websiteData.teachers.filter(t => t.id !== id);
                saveData();
                renderTeachers();
            }
        }

        // 新闻模态框
        function showAddNewsModal() {
            editingNews = null;
            document.getElementById('newsModalTitle').textContent = '添加新闻';
            document.getElementById('newsForm').reset();
            document.getElementById('newsModal').style.display = 'flex';
        }

        function editNews(id) {
            const news = websiteData.news.find(n => n.id === id);
            if (!news) return;

            editingNews = news;

            document.getElementById('newsModalTitle').textContent = '编辑新闻';
            document.getElementById('newsTitle').value = news.title;
            document.getElementById('newsDate').value = news.date;
            document.getElementById('newsContent').value = news.content;

            document.getElementById('newsModal').style.display = 'flex';
        }

        function closeNewsModal() {
            document.getElementById('newsModal').style.display = 'none';
        }

        // 保存新闻
        document.getElementById('newsForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const newsData = {
                id: editingNews ? editingNews.id : Date.now(),
                title: document.getElementById('newsTitle').value,
                date: document.getElementById('newsDate').value,
                content: document.getElementById('newsContent').value
            };

            if (editingNews) {
                Object.assign(editingNews, newsData);
            } else {
                websiteData.news.push(newsData);
            }

            saveData();
            renderNews();
            closeNewsModal();
        });

        // 删除新闻
        function deleteNews(id) {
            if (confirm('确定要删除这条新闻吗？')) {
                websiteData.news = websiteData.news.filter(n => n.id !== id);
                saveData();
                renderNews();
            }
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
