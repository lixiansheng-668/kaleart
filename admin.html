<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咔乐艺术 - 管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm: #d4846a;
            --warm-deep: #c06a4e;
            --warm-light: #fdf0eb;
            --cream: #fef9f3;
            --ink: #3d322b;
            --ink-light: #7a6e64;
            --green: #5b8c5a;
            --green-light: #e8f0e5;
            --gold: #d4a853;
            --gold-light: #faf5e8;
            --white: #ffffff;
            --border: #ede4db;
            --shadow-sm: 0 2px 12px rgba(61,50,43,0.06);
            --shadow: 0 4px 24px rgba(61,50,43,0.09);
            --shadow-lg: 0 8px 40px rgba(61,50,43,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font-display: "Noto Serif SC", serif;
            --font-body: "Noto Sans SC", sans-serif;
            --max-width: 1200px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--cream);
            color: var(--ink);
            line-height: 1.8;
        }

        /* 登录界面 */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf0eb 100%);
        }

        .login-box {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-family: var(--font-display);
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
            color: var(--warm);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--ink);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--warm);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--warm);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: var(--warm-deep);
        }

        /* 管理界面 */
        .admin-container {
            display: none;
            min-height: 100vh;
        }

        .admin-header {
            background: var(--warm);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .admin-nav {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-nav h1 {
            font-family: var(--font-display);
            font-size: 24px;
        }

        .logout-btn {
            padding: 8px 20px;
            background: white;
            color: var(--warm);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .admin-content {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 40px 20px;
        }

        .admin-section {
            background: white;
            padding: 30px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .admin-section h2 {
            font-family: var(--font-display);
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--ink);
        }

        .editable {
            border: 2px dashed transparent;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .editable:hover {
            border-color: var(--warm);
            background: var(--warm-light);
        }

        .editing {
            border-color: var(--warm);
            background: var(--warm-light);
        }

        .edit-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--warm);
            border-radius: 4px;
            font-size: 16px;
            font-family: inherit;
        }

        .edit-textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--warm);
            border-radius: 4px;
            font-size: 16px;
            font-family: inherit;
            min-height: 100px;
            resize: vertical;
        }

        .save-btn {
            margin-top: 10px;
            padding: 6px 16px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .save-btn:hover {
            background: #4a7c4a;
        }

        .cancel-btn {
            margin-top: 10px;
            margin-right: 10px;
            padding: 6px 16px;
            background: #999;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .cancel-btn:hover {
            background: #777;
        }

        /* 教师管理 */
        .teacher-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .teacher-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .teacher-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .action-btn {
            padding: 4px 8px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .edit-teacher {
            background: var(--warm);
            color: white;
        }

        .delete-teacher {
            background: #e74c3c;
            color: white;
        }

        /* 添加按钮 */
        .add-btn {
            padding: 12px 24px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .add-btn:hover {
            background: #4a7c4a;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: var(--green);
            color: white;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s;
        }

        .notification.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>🎨 咔乐艺术 - 管理后台</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="adminPassword">管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理密码" required>
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: var(--ink-light); font-size: 14px;">
                提示：默认密码是 123456
            </p>
        </div>
    </div>

    <!-- 管理界面 -->
    <div class="admin-container" id="adminContainer">
        <header class="admin-header">
            <div class="admin-nav">
                <h1>🎨 管理后台</h1>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </header>

        <div class="admin-content">
            <!-- 网站基本信息 -->
            <div class="admin-section">
                <h2>📝 网站基本信息</h2>
                <div class="editable" onclick="editText(this, 'siteTitle')">
                    <h3 id="siteTitle">合肥咔乐艺术培训中心</h3>
                </div>

                <div class="editable" onclick="editText(this, 'siteSubtitle')" style="margin-top: 15px;">
                    <p id="siteSubtitle">用爱与专业守护每一个艺术梦想</p>
                </div>

                <div class="editable" onclick="editText(this, 'siteDescription')" style="margin-top: 15px;">
                    <p id="siteDescription">合肥咔乐艺术培训中心，专注少儿美术教育。开设水彩、素描、国画、书法、油画等课程，专业师资，小班教学。</p>
                </div>
            </div>

            <!-- 课程管理 -->
            <div class="admin-section">
                <h2>📚 课程管理</h2>
                <button class="add-btn" onclick="addCourse()">+ 添加新课程</button>
                <div id="coursesList"></div>
            </div>

            <!-- 教师管理 -->
            <div class="admin-section">
                <h2>👥 教师管理</h2>
                <button class="add-btn" onclick="showAddTeacherForm()">+ 添加新教师</button>
                <div id="teachersList" class="teacher-grid"></div>
            </div>

            <!-- 新闻动态 -->
            <div class="admin-section">
                <h2>📰 新闻动态</h2>
                <button class="add-btn" onclick="addNews()">+ 添加新闻</button>
                <div id="newsList"></div>
            </div>
        </div>
    </div>

    <!-- 通知 -->
    <div class="notification" id="notification"></div>

    <script>
        // 管理员密码
        const ADMIN_PASSWORD = '123456';

        // 数据存储
        let websiteData = {
            site: {
                title: '合肥咔乐艺术培训中心',
                subtitle: '用爱与专业守护每一个艺术梦想',
                description: '合肥咔乐艺术培训中心，专注少儿美术教育。开设水彩、素描、国画、书法、油画等课程，专业师资，小班教学。'
            },
            courses: [
                {
                    id: 1,
                    name: '线描 & 卡漫班',
                    teacher: '张梦琪',
                    age: '9-16岁',
                    desc: '学习线条表现力与漫画创作技巧，培养角色设计和叙事表达能力。',
                    stages: ['线条基础', '角色设计', '故事创作'],
                    detail: '系统学习线条的表现力，从基础素描到漫画创作。学习角色设计、分镜绘制和故事叙述，培养动漫创作的综合能力。',
                    price: '¥2,280/16课时',
                    duration: '120分钟/次',
                    classSize: '4-6人'
                }
            ],
            teachers: [
                {
                    id: 1,
                    name: '张梦琪',
                    tagline: '陪孩子用色彩讲故事的人',
                    school: '安徽师范大学 · 美术学',
                    cert: '高级中学美术教师资格证',
                    years: '8年',
                    degree: '本科',
                    philosophy: '我从不教孩子"应该怎么画"，而是帮他们发现"原来我可以这样画"。每个孩子的笔触都是独一无二的语言。',
                    specialties: '水彩, 儿童创意美术, 素描基础, 绘本创作',
                    achievements: '辅导学生获合肥市少儿绘画大赛一等奖12人次；所带班级美术考级通过率100%；个人水彩作品《徽州印象》入选安徽省青年美术作品展',
                    message: '我始终相信，艺术教育不是培养画家，而是培养一个完整的人。在我的课堂上，孩子们学会的不仅是技法，更是观察世界的方式、表达自己的勇气。期待与您一起，守护孩子心中那份对美的本能热爱。'
                },
                {
                    id: 2,
                    name: '李浩然',
                    tagline: '让每个孩子都敢大胆下笔',
                    school: '合肥师范学院 · 美术教育',
                    cert: '小学美术教师资格证',
                    years: '5年',
                    degree: '本科',
                    philosophy: '绘画不是复制，是创造。我致力于保护孩子的想象力，让技巧自然地服务于表达。',
                    specialties: '国画入门, 硬笔书法, 创意手工, 综合材料',
                    achievements: '带领学生参加"全国少儿书画大赛"获金奖3项；个人书法作品获合肥市教师书法展二等奖；开发"趣味水墨"系列课程获家长好评',
                    message: '教育是一场温暖的修行。看到孩子从"我不会画"到自信地举起作品给我看，是我最有成就感的时刻。请放心把孩子交给我，我们一起见证成长。'
                },
                {
                    id: 3,
                    name: '王雨桐',
                    tagline: '用画笔打开孩子的内心世界',
                    school: '南京艺术学院 · 绘画专业',
                    cert: '高级中学美术教师资格证',
                    years: '6年',
                    degree: '硕士',
                    philosophy: '艺术教育的本质是"看见"——看见每个孩子的独特，并帮他们看见自己的光芒。',
                    specialties: '色彩理论, 油画入门, 艺术鉴赏, 考前辅导',
                    achievements: '辅导多名学生考入知名美院附中；个人油画作品《夏》获安徽省油画展优秀奖；连续3年被评为咔乐艺术"最受欢迎教师"',
                    message: '每个孩子都是天生的艺术家，只是有些孩子长大后被"教"忘了。我的任务就是帮他们重新找回那份与生俱来的创造力。欢迎随时和我交流孩子的学习情况。'
                },
                {
                    id: 4,
                    name: '孙瑞',
                    tagline: '一手好字，自信一生',
                    school: '安徽职业技术大学 · 软件技术',
                    cert: '小学美术老师',
                    years: '5年',
                    degree: '本科',
                    philosophy: '我从不教孩子"应该怎么画"，而是帮他们发现"原来我可以这样画"。每个孩子的笔触都是独一无二的语言，老师要做的不是纠正，而是看见和引导。',
                    specialties: '硬笔书法, 楷书, 行书, 作业快写体',
                    achievements: '学员书法考级通过率达100%；辅导学员多次荣获全国硬笔书法比赛金奖、银奖、特等奖等重要奖项',
                    message: '硬笔书法这件事，说到底我们不仅要把每个孩子都练成写字高手。课堂上，我还要在意的是：孩子能不能在横平竖直里学会坐得住、静下来。字写工整了，卷面自然少扣分；但比分数更重要的，是那份不急不躁的定力。'
                }
            ],
            news: [
                {
                    id: 1,
                    title: '2026年春季班招生开始啦！',
                    date: '2026-03-01',
                    content: '新学期新气象，咔乐艺术2026年春季班开始招生了！开设水彩、素描、国画、书法等多个课程，欢迎小朋友们报名学习。'
                }
            ]
        };

        // 从localStorage加载数据
        function loadData() {
            const saved = localStorage.getItem('kaleart_admin_data');
            if (saved) {
                websiteData = JSON.parse(saved);
            }
        }

        // 保存数据
        function saveData() {
            localStorage.setItem('kaleart_admin_data', JSON.stringify(websiteData));
            showNotification('保存成功！');
        }

        // 显示通知
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 登录
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
                loadData();
                renderAll();
            } else {
                alert('密码错误！');
            }
        });

        // 退出登录
        function logout() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminContainer').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }

        // 编辑文本
        function editText(element, field) {
            const originalContent = element.innerHTML;
            const isHtml = field === 'siteTitle';

            if (isHtml) {
                element.innerHTML = `<input type="text" class="edit-input" value="${websiteData.site[field]}" id="edit-${field}">`;
            } else {
                element.innerHTML = `<textarea class="edit-textarea" id="edit-${field}">${websiteData.site[field]}</textarea>`;
            }

            element.classList.add('editing');

            const input = document.getElementById(`edit-${field}`);
            input.focus();

            element.onclick = null; // 防止再次触发

            const saveBtn = document.createElement('div');
            saveBtn.innerHTML = `<button class="cancel-btn" onclick="cancelEdit(this, '${field}', \`${originalContent.replace(/`/g, '\\`')}\`)">取消</button><button class="save-btn" onclick="saveText('${field}', this.parentElement.parentElement)">保存</button>`;
            element.appendChild(saveBtn);
        }

        // 取消编辑
        function cancelEdit(btn, field, originalContent) {
            const element = btn.parentElement.parentElement;
            element.innerHTML = originalContent;
            element.classList.remove('editing');
            element.onclick = () => editText(element, field);
        }

        // 保存文本
        function saveText(field, element) {
            const input = element.querySelector(`#edit-${field}`);
            websiteData.site[field] = input.value;
            saveData();

            // 更新页面
            if (field === 'siteTitle') {
                document.getElementById('siteTitle').textContent = input.value;
            } else if (field === 'siteSubtitle') {
                document.getElementById('siteSubtitle').textContent = input.value;
            } else if (field === 'siteDescription') {
                document.getElementById('siteDescription').textContent = input.value;
            }

            element.classList.remove('editing');
            element.onclick = () => editText(element, field);
        }

        // 渲染所有内容
        function renderAll() {
            renderCourses();
            renderTeachers();
            renderNews();
        }

        // 渲染课程
        function renderCourses() {
            const container = document.getElementById('coursesList');
            container.innerHTML = websiteData.courses.map(course => `
                <div class="teacher-card">
                    <div class="teacher-actions">
                        <button class="action-btn edit-teacher" onclick="editCourse(${course.id})">编辑</button>
                        <button class="action-btn delete-teacher" onclick="deleteCourse(${course.id})">删除</button>
                    </div>
                    <h3>${course.name}</h3>
                    <p style="color: var(--warm); margin: 10px 0;">授课老师：${course.teacher}</p>
                    <p style="color: var(--ink-light); margin: 10px 0;">年龄：${course.age}</p>
                    <p>${course.desc}</p>
                </div>
            `).join('');
        }

        // 渲染教师
        function renderTeachers() {
            const container = document.getElementById('teachersList');
            container.innerHTML = websiteData.teachers.map(teacher => `
                <div class="teacher-card">
                    <div class="teacher-actions">
                        <button class="action-btn edit-teacher" onclick="editTeacher(${teacher.id})">编辑</button>
                        <button class="action-btn delete-teacher" onclick="deleteTeacher(${teacher.id})">删除</button>
                    </div>
                    <h3>${teacher.name}</h3>
                    <p style="color: var(--warm); font-size: 14px; margin: 5px 0;">${teacher.tagline}</p>
                    <p style="color: var(--ink-light); font-size: 12px; margin: 5px 0;">${teacher.school} | ${teacher.years}年</p>
                    <p style="margin-top: 10px; font-size: 14px;">${teacher.philosophy}</p>
                </div>
            `).join('');
        }

        // 渲染新闻
        function renderNews() {
            const container = document.getElementById('newsList');
            container.innerHTML = websiteData.news.map(news => `
                <div class="teacher-card" style="margin-bottom: 15px;">
                    <div class="teacher-actions">
                        <button class="action-btn edit-teacher" onclick="editNews(${news.id})">编辑</button>
                        <button class="action-btn delete-teacher" onclick="deleteNews(${news.id})">删除</button>
                    </div>
                    <h3>${news.title}</h3>
                    <p style="color: var(--ink-light); font-size: 14px; margin: 5px 0;">${news.date}</p>
                    <p style="margin-top: 10px; font-size: 14px;">${news.content}</p>
                </div>
            `).join('');
        }

        // 添加课程
        function addCourse() {
            const name = prompt('课程名称：');
            if (!name) return;

            const teacher = prompt('授课老师：');
            if (!teacher) return;

            const age = prompt('年龄段：');
            if (!age) return;

            const desc = prompt('课程简介：');
            if (!desc) return;

            const newCourse = {
                id: Date.now(),
                name,
                teacher,
                age,
                desc,
                stages: [],
                detail: '',
                price: '',
                duration: '',
                classSize: ''
            };

            websiteData.courses.push(newCourse);
            saveData();
            renderCourses();
        }

        // 添加教师
        function showAddTeacherForm() {
            const name = prompt('教师姓名：');
            if (!name) return;

            const tagline = prompt('一句话标签：');
            if (!tagline) return;

            const school = prompt('毕业院校：');
            if (!school) return;

            const cert = prompt('教师资格证：');
            if (!cert) return;

            const years = prompt('从教年限：');
            if (!years) return;

            const philosophy = prompt('教学理念：');
            if (!philosophy) return;

            const newTeacher = {
                id: Date.now(),
                name,
                tagline,
                school,
                cert,
                years,
                degree: '本科',
                philosophy,
                specialties: '',
                achievements: '',
                message: ''
            };

            websiteData.teachers.push(newTeacher);
            saveData();
            renderTeachers();
        }

        // 添加新闻
        function addNews() {
            const title = prompt('新闻标题：');
            if (!title) return;

            const date = prompt('发布日期（YYYY-MM-DD）：');
            if (!date) return;

            const content = prompt('新闻内容：');
            if (!content) return;

            const newNews = {
                id: Date.now(),
                title,
                date,
                content
            };

            websiteData.news.push(newNews);
            saveData();
            renderNews();
        }

        // 编辑课程（简化版）
        function editCourse(id) {
            const course = websiteData.courses.find(c => c.id === id);
            if (!course) return;

            const newName = prompt('课程名称：', course.name);
            if (newName !== null) {
                course.name = newName;
                saveData();
                renderCourses();
            }
        }

        // 删除课程
        function deleteCourse(id) {
            if (confirm('确定要删除这个课程吗？')) {
                websiteData.courses = websiteData.courses.filter(c => c.id !== id);
                saveData();
                renderCourses();
            }
        }

        // 编辑教师（简化版）
        function editTeacher(id) {
            const teacher = websiteData.teachers.find(t => t.id === id);
            if (!teacher) return;

            const newName = prompt('教师姓名：', teacher.name);
            if (newName !== null) {
                teacher.name = newName;
                saveData();
                renderTeachers();
            }
        }

        // 删除教师
        function deleteTeacher(id) {
            if (confirm('确定要删除这位教师吗？')) {
                websiteData.teachers = websiteData.teachers.filter(t => t.id !== id);
                saveData();
                renderTeachers();
            }
        }

        // 编辑新闻
        function editNews(id) {
            const news = websiteData.news.find(n => n.id === id);
            if (!news) return;

            const newTitle = prompt('新闻标题：', news.title);
            if (newTitle !== null) {
                news.title = newTitle;
                saveData();
                renderNews();
            }
        }

        // 删除新闻
        function deleteNews(id) {
            if (confirm('确定要删除这条新闻吗？')) {
                websiteData.news = websiteData.news.filter(n => n.id !== id);
                saveData();
                renderNews();
            }
        }
    </script>
