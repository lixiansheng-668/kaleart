<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px;
    height: 1132px;
    background: #FAFAF7;
    font-family: 'Microsoft YaHei', 'PingFang SC', 'Heiti SC', sans-serif;
    color: #2C2C2C;
    position: relative;
    overflow: hidden;
  }

  .accent-line {
    position: absolute;
    top: 80px;
    left: 80px;
    width: 120px;
    height: 3px;
    background: #C84B3C;
  }

  .hero-char {
    position: absolute;
    top: 140px;
    left: 68px;
    font-size: 220px;
    font-weight: 900;
    color: #EAE2DD;
    letter-spacing: -8px;
    line-height: 1;
    user-select: none;
    pointer-events: none;
    z-index: 1;
  }

  .title-block {
    position: absolute;
    top: 280px;
    left: 80px;
    z-index: 2;
  }
  .title-cn {
    font-size: 48px;
    font-weight: 700;
    color: #2C2C2C;
    letter-spacing: 12px;
    line-height: 1.4;
  }
  .title-sub {
    font-size: 14px;
    font-weight: 400;
    color: #C84B3C;
    letter-spacing: 8px;
    margin-top: 4px;
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  .message {
    position: absolute;
    top: 500px;
    left: 80px;
    right: 80px;
    font-size: 18px;
    font-weight: 400;
    color: #7A7A7A;
    letter-spacing: 4px;
    line-height: 2;
    z-index: 2;
  }

  .divider {
    position: absolute;
    top: 660px;
    left: 80px;
    width: 60px;
    height: 1px;
    background: #D0D0D0;
  }

  .info-block {
    position: absolute;
    bottom: 200px;
    left: 80px;
    z-index: 2;
  }
  .info-item {
    font-size: 13px;
    color: #9A9A9A;
    letter-spacing: 3px;
    line-height: 2.4;
    font-weight: 400;
  }
  .info-label {
    color: #C84B3C;
    font-size: 11px;
    letter-spacing: 2px;
    margin-right: 8px;
  }

  .geo-block {
    position: absolute;
    bottom: 80px;
    right: 80px;
    width: 180px;
    height: 180px;
    background: #C84B3C;
    opacity: 0.06;
    z-index: 1;
  }
  .geo-block-2 {
    position: absolute;
    bottom: 100px;
    right: 100px;
    width: 140px;
    height: 140px;
    border: 1px solid #C84B3C;
    opacity: 0.12;
    z-index: 2;
  }

  .dot-grid {
    position: absolute;
    top: 140px;
    right: 80px;
    width: 100px;
    height: 100px;
    background-image: radial-gradient(circle, #2C2C2C 1px, transparent 1px);
    background-size: 20px 20px;
    opacity: 0.06;
    z-index: 1;
  }

  .vert-accent {
    position: absolute;
    top: 80px;
    right: 80px;
    width: 1px;
    height: 300px;
    background: #E0E0E0;
    z-index: 1;
  }

  .corner-mark {
    position: absolute;
    bottom: 80px;
    left: 80px;
    font-size: 10px;
    color: #C0C0C0;
    letter-spacing: 4px;
    font-family: 'Georgia', serif;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="accent-line"></div>
  <div class="vert-accent"></div>
  <div class="dot-grid"></div>

  <div class="hero-char">&#x5494;&#x4E50;</div>

  <div class="title-block">
    <div class="title-cn">&#x5494;&#x4E50;&#x827A;&#x672F;</div>
    <div class="title-sub">KA-LE ART STUDIO</div>
  </div>

  <div class="message">
    &#x6BCF;&#x4E2A;&#x5B69;&#x5B50;&#x90FD;&#x662F;&#x5929;&#x751F;&#x7684;&#x827A;&#x672F;&#x5BB6;&#x3002;<br>
    &#x6211;&#x4EEC;&#x505A;&#x7684;&#xFF0C;&#x53EA;&#x662F;&#x5B88;&#x62A4;&#x90A3;&#x4EFD;&#x76F4;&#x89C9;&#x4E0E;&#x52C7;&#x6C14;&#x3002;
  </div>

  <div class="divider"></div>

  <div class="info-block">
    <div class="info-item"><span class="info-label">&#x62DB;&#x751F;</span> 2025 &#x79CB;&#x5B63;&#x5B66;&#x671F; &#xB7; &#x5C11;&#x513F;&#x7F8E;&#x672F; / &#x7D20;&#x63CF; / &#x8272;&#x5F69; / &#x9676;&#x827A;</div>
    <div class="info-item"><span class="info-label">&#x5E74;&#x9F84;</span> 4-16 &#x5C81;&#xFF0C;&#x6309;&#x5E74;&#x9F84;&#x6BB5;&#x5206;&#x73ED;&#xFF0C;&#x5C0F;&#x73ED;&#x6559;&#x5B66;</div>
    <div class="info-item"><span class="info-label">&#x5730;&#x5740;</span> &#x57CE;&#x5E02; &#xB7; &#x8857;&#x9053; &#xB7; &#x53F7;&#x7801;&#xFF08;&#x656C;&#x8BF7;&#x6765;&#x7535;&#x54A8;&#x8BE2;&#xFF09;</div>
    <div class="info-item"><span class="info-label">&#x7535;&#x8BDD;</span> 000 - 0000 0000</div>
  </div>

  <div class="geo-block"></div>
  <div class="geo-block-2"></div>

  <div class="corner-mark">ENROLLING &#xB7; 2025</div>
</body>
</html>
